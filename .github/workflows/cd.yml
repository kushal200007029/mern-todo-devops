name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI - Build & Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set image tag (same as CI)
      - name: Set image tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "IMAGE_TAG=$SHORT_SHA" >> $GITHUB_ENV

      # 3. Debug
      - name: Debug image tag
        run: echo "Deploying image with tag $IMAGE_TAG"

      # 4. Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 5. Install kubectl
      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      # 6. Update kubeconfig from AWS (CRITICAL STEP)
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name devops-eks-cluster

      # 7. Replace IMAGE_TAG in deployment.yaml
      - name: Update Deployment Image
        run: |
          sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" k8s/deployment.yaml

      # 8. Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # 9. Verify rollout
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/mern-backend